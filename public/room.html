<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="WatchParty room — watch in sync with friends." />
  <title>WatchParty Room</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    /* ── Room layout ── */
    body { overflow: hidden; }

    .room-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      grid-template-rows: 56px 1fr 72px;
      grid-template-areas:
        "topbar topbar"
        "player sidebar"
        "controls controls";
      height: 100vh;
      background: var(--bg-base);
    }

    /* ── Top Bar ── */
    .topbar {
      grid-area: topbar;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-logo { font-weight: 700; font-size: 0.95rem; letter-spacing: 0.05em; }
    .room-id-badge {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: monospace;
      background: var(--bg-elevated);
      padding: 3px 10px;
      border-radius: 100px;
      border: 1px solid var(--border);
    }
    .topbar-right { display: flex; align-items: center; gap: 8px; }

    /* ── Player area ── */
    .player-area {
      grid-area: player;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #video-frame {
      width: 100%;
      height: 100%;
      border: none;
    }
    /* Empty state */
    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 24px;
      background: var(--bg-surface);
    }
    .empty-state-icon { font-size: 3rem; }
    .empty-state h2 { color: var(--text-primary); }
    .empty-state p { color: var(--text-muted); font-size: 0.9rem; max-width: 280px; }

    /* Guest overlay — blocks controls visually */
    .guest-overlay {
      position: absolute;
      inset: 0;
      background: transparent;
      cursor: not-allowed;
      z-index: 5;
    }

    /* Catch-up flash */
    .catchup-flash {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #fff;
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 10;
      animation: flashPop 2s ease forwards;
      pointer-events: none;
    }
    @keyframes flashPop {
      0%   { opacity: 0; transform: translateX(-50%) translateY(10px); }
      15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      75%  { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(-6px); }
    }

    /* ── Sidebar ── */
    .sidebar {
      grid-area: sidebar;
      display: flex;
      flex-direction: column;
      background: var(--bg-surface);
      border-left: 1px solid var(--border);
      overflow: hidden;
    }
    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* URL loader (host only) */
    .url-loader { display: flex; gap: 8px; }
    .url-loader .input { flex: 1; padding: 9px 12px; font-size: 0.82rem; }

    /* Member list */
    .member-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .member-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      font-size: 0.85rem;
      animation: memberIn 200ms ease;
    }
    @keyframes memberIn {
      from { opacity: 0; transform: translateX(10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .member-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #c084fc);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .member-name { flex: 1; font-weight: 500; }

    /* Invite section at bottom of sidebar */
    .invite-section {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }
    .invite-row { display: flex; gap: 6px; }
    .invite-link-display {
      flex: 1;
      padding: 8px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: monospace;
    }

    /* ── Playback Controls (host) ── */
    .controls-bar {
      grid-area: controls;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
    }
    .seek-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .seek-bar {
      -webkit-appearance: none;
      width: 100%; height: 4px;
      border-radius: 2px;
      background: var(--bg-elevated);
      outline: none;
      cursor: pointer;
      accent-color: var(--accent);
    }
    .seek-bar::-webkit-slider-runnable-track {
      background: linear-gradient(
        to right,
        var(--accent) 0%,
        var(--accent) var(--progress, 0%),
        var(--bg-elevated) var(--progress, 0%)
      );
      height: 4px; border-radius: 2px;
    }
    .time-display {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      display: flex; justify-content: space-between;
    }
    .control-btns { display: flex; align-items: center; gap: 8px; }
    .control-btns .btn-icon { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-secondary); }
    .control-btns .btn-icon:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    #btn-play-pause { font-size: 1.3rem; width: 48px; height: 48px; }

    /* Guest controls bar message */
    .guest-controls-msg {
      flex: 1;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .room-layout {
        grid-template-columns: 1fr;
        grid-template-rows: 56px 1fr auto 72px;
        grid-template-areas:
          "topbar"
          "player"
          "sidebar"
          "controls";
      }
      .sidebar { max-height: 220px; border-left: none; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <div class="room-layout" id="room-layout">

    <!-- ── Top bar ── -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="topbar-logo">🎬 WatchParty</span>
        <span class="room-id-badge" id="room-id-display">Connecting…</span>
        <span class="badge badge-guest" id="role-badge">Guest</span>
      </div>
      <div class="topbar-right">
        <span id="member-count" style="font-size:0.82rem;color:var(--text-muted);">0 watching</span>
        <button class="btn btn-ghost" id="btn-leave" onclick="leaveRoom()" style="padding:8px 14px;font-size:0.82rem;">Leave</button>
      </div>
    </header>

    <!-- ── Player ── -->
    <section class="player-area" aria-label="Video player">
      <!-- Empty state -->
      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon">🎬</div>
        <h2>No Video Loaded</h2>
        <p id="empty-state-hint">Paste a YouTube URL in the panel on the right to get started.</p>
      </div>

      <!-- YouTube iframe (hidden until URL loaded) -->
      <iframe
        id="video-frame"
        class="hidden"
        allow="autoplay; encrypted-media"
        allowfullscreen
        title="WatchParty video player"
      ></iframe>

      <!-- Guest overlay — prevents direct iframe interaction -->
      <div class="guest-overlay hidden" id="guest-overlay" aria-hidden="true"></div>
    </section>

    <!-- ── Sidebar ── -->
    <aside class="sidebar" aria-label="Room panel">
      <!-- URL Loader (host only) -->
      <div class="sidebar-section" id="url-section">
        <div class="sidebar-title">Load Video</div>
        <div class="url-loader">
          <input class="input" id="url-input" type="url" placeholder="YouTube URL…" aria-label="YouTube video URL" />
          <button class="btn btn-primary" id="btn-load" style="padding:9px 14px;" onclick="loadVideo()">▶</button>
        </div>
      </div>

      <!-- Members -->
      <div class="sidebar-section" style="border-bottom:none;padding-bottom:8px;">
        <div class="sidebar-title">In the Room</div>
      </div>
      <div class="member-list" id="member-list" aria-live="polite" aria-label="Members list"></div>

      <!-- Invite link -->
      <div class="invite-section">
        <div class="sidebar-title" style="margin-bottom:8px;">Invite Link</div>
        <div class="invite-row">
          <div class="invite-link-display" id="invite-display">—</div>
          <button class="btn btn-ghost" id="btn-copy" onclick="copyInvite()" style="padding:8px 12px;font-size:0.8rem;" aria-label="Copy invite link">Copy</button>
        </div>
      </div>
    </aside>

    <!-- ── Controls bar ── -->
    <footer class="controls-bar" aria-label="Playback controls">
      <!-- Host controls -->
      <div class="control-btns" id="host-controls">
        <button class="btn btn-icon" id="btn-play-pause" onclick="togglePlay()" aria-label="Play/Pause">▶</button>
      </div>
      <div class="seek-wrap" id="host-seek">
        <input type="range" class="seek-bar" id="seek-bar" min="0" max="100" value="0"
               aria-label="Seek" oninput="onSeekInput(this.value)" onchange="onSeekCommit(this.value)" />
        <div class="time-display">
          <span id="time-current">0:00</span>
          <span id="time-total">0:00</span>
        </div>
      </div>

      <!-- Guest message (shown instead when not host) -->
      <div class="guest-controls-msg hidden" id="guest-msg">
        ⏸ Playback controlled by the host
      </div>
    </footer>
  </div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/js/room.js"></script>
</body>
</html>
